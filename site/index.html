<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Who owned it, and when — BODS ownership timelines</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Open Ownership / BOVS design system — matches opencheck + bods-stream */
    --bg:#f3f3f5; --card:#ffffff; --panel-2:#f6f6f8;
    --ink:#191d23; --muted:#757575; --line:#e5e5e5;
    --accent:#3d30d4;            /* Open Ownership blue */
    --now:#be123c;               /* lifecycle 'closed' rose — the today marker */
    /* owner-kind semantics, harmonised with the system's lifecycle/alert palette */
    --entity:#3d30d4;            /* UK company in the chain = brand blue (the spine) */
    --person:#1f9d4e;            /* resolved human owner = lifecycle 'new' green */
    --foreign:#c2410c;           /* chain leaves the UK register = alert orange */
    --unresolved:#9aa0a6;        /* not yet walked = neutral grey */
    --ceased:#b6bac0;
    --gap:#9a3412; --gap-bg:#fff7ed;  /* declared gap = alert amber */
    --shares:#3d30d4; --voting:#6a3df0; --appoint:#9a3412; --influence:#757575;
    --font-body:"DM Sans",system-ui,sans-serif;
    --font-head:"Bitter",Georgia,serif;
    --font-mono:"DM Mono",ui-monospace,SFMono-Regular,monospace;
    --radius:10px; --shadow-card:0 8px 32px rgba(61,48,212,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 var(--font-body);-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:var(--font-head);color:var(--ink)}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .wrap{max-width:1100px;margin:0 auto;padding:28px 20px 80px}
  header{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:4px}
  .eyebrow{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:8px}
  header h1{font-size:27px;margin:0 0 6px;letter-spacing:-.01em;font-weight:700}
  header p.sub{margin:0;color:var(--muted);max-width:780px}
  .tagline{margin-top:10px;font-size:13px;color:var(--muted)} .tagline b{color:var(--ink)}

  .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin:22px 0 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;cursor:pointer;
    transition:border-color .15s, box-shadow .15s}
  .card:hover{border-color:#c7c3f2;box-shadow:var(--shadow-card)}
  .card.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(61,48,212,.14)}
  .card .name{font-weight:650;font-size:15px;margin-bottom:4px}
  .card .hook{color:var(--muted);font-size:13px;margin-bottom:8px}
  .card .ult{font-size:12px;border-top:1px dashed var(--line);padding-top:7px}
  .card .ult b{color:var(--ink)}
  .kindtag{display:inline-block;font-size:10px;padding:0 5px;border-radius:4px;color:#fff;margin-left:4px;vertical-align:1px}
  .kindtag.person{background:var(--person)} .kindtag.foreign{background:var(--foreign)}
  .kindtag.gap{background:var(--gap)} .kindtag.unresolved{background:var(--unresolved)} .kindtag.entity{background:var(--entity)}

  .detail{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-top:18px;box-shadow:var(--shadow-card)}
  .detail h2{margin:0 0 2px;font-size:21px;font-weight:700}
  .detail .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
  .blurb{max-width:820px;margin:0 0 16px}
  .callout{display:flex;gap:10px;align-items:flex-start;background:rgba(61,48,212,.05);border:1px solid var(--line);
    border-left:3px solid var(--accent);border-radius:8px;padding:11px 13px;font-size:13.5px;margin-bottom:18px}
  .callout b{color:var(--accent)}
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 13px;font-size:13px;cursor:pointer;color:var(--muted)}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

  .layout{display:flex;gap:18px;align-items:flex-start}
  .chartcol{flex:1;min-width:0}
  .sidecol{width:300px;flex:none}

  .chart{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;user-select:none}
  .labels{width:250px;flex:none;border-right:1px solid var(--line);background:var(--panel-2)}
  .plot{position:relative;flex:1;overflow:hidden}
  .lcell,.tcell{border-bottom:1px solid var(--line)}
  .lcell{padding:0 10px;display:flex;flex-direction:column;justify-content:center}
  .tcell{position:relative}
  .grow{height:30px;background:var(--panel-2);border-bottom:1px solid var(--line)}
  .glabel{display:flex;align-items:center;height:30px;font-size:12px;font-weight:650}
  .glabel .lv{font-size:9.5px;font-weight:700;color:#fff;background:var(--unresolved);border-radius:4px;padding:0 5px;margin-right:6px}
  .glabel.root .lv{background:var(--accent)}
  .glabel a{color:inherit}
  .l-name{font-weight:600;font-size:13px;line-height:1.2}
  .l-sub{font-size:11px;color:var(--muted)}
  .l-type{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ceased)}

  .grid{position:absolute;inset:0;pointer-events:none}
  .gridline{position:absolute;top:0;bottom:0;width:1px;background:var(--line)}
  .gridlabel{position:absolute;top:2px;font-size:10px;color:var(--ceased);transform:translateX(4px)}
  .now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--now);opacity:.45}
  .retain-line{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed #94a3b8;opacity:.5}
  .retain-label{position:absolute;bottom:2px;font-size:9.5px;color:#64748b;transform:translateX(4px);white-space:nowrap}

  .bar{position:absolute;top:9px;height:22px;border-radius:6px;display:flex;align-items:center;gap:6px;
    padding:0 8px;font-size:11.5px;color:#fff;overflow:hidden;white-space:nowrap;min-width:5px}
  .bar.entity{background:var(--entity)} .bar.person{background:var(--person)}
  .bar.foreign{background:var(--foreign)} .bar.unresolved{background:var(--unresolved)}
  .bar.ceased{opacity:.5}
  .bar .ongoing{font-size:9.5px;opacity:.9}
  .natures{position:absolute;top:34px;display:flex;gap:3px;flex-wrap:nowrap;overflow:hidden}
  .pill{font-size:9.5px;padding:0 5px;border-radius:999px;color:#fff;white-space:nowrap}
  .pill.shares{background:var(--shares)} .pill.voting{background:var(--voting)}
  .pill.appoint{background:var(--appoint)} .pill.influence{background:var(--influence)}

  .gapbar{position:absolute;top:11px;height:20px;border-radius:6px;background:repeating-linear-gradient(45deg,
    var(--gap-bg),var(--gap-bg) 7px,#fde9c8 7px,#fde9c8 14px);border:1px solid #f0c98a;
    display:flex;align-items:center;padding:0 8px;font-size:11px;color:var(--gap);font-weight:600;white-space:nowrap;overflow:hidden}
  .gap-marker{position:absolute;top:7px;width:0;height:28px;border-left:2px solid var(--gap)}
  .gap-marker::after{content:"⚑";position:absolute;top:-14px;left:-5px;color:var(--gap);font-size:11px}
  .tick{position:absolute;top:3px;width:9px;height:9px;background:var(--ink);transform:translateX(-50%) rotate(45deg);
    cursor:pointer;border:1px solid #fff}
  .tick:hover{background:var(--now)}

  .cursor{position:absolute;top:0;bottom:0;width:0;border-left:2px solid var(--ink);z-index:5;cursor:ew-resize}
  .cursor .knob{position:absolute;top:-1px;left:-7px;width:12px;height:12px;border-radius:50%;background:var(--ink)}
  .cursor .flag{position:absolute;top:-22px;left:0;transform:translateX(-50%);background:var(--ink);color:#fff;
    font-size:10.5px;padding:1px 6px;border-radius:4px;white-space:nowrap;font-family:var(--font-mono)}

  .side{border:1px solid var(--line);border-radius:var(--radius);padding:14px;background:var(--panel-2);position:sticky;top:14px;box-shadow:var(--shadow-card)}
  .side h3{margin:0 0 3px;font-size:14px;font-weight:700}
  .side .date{font-size:12px;color:var(--muted);margin-bottom:10px;font-family:var(--font-mono)}
  .side .hint{font-size:11.5px;color:var(--muted);margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
  .pnode{margin:0} .pname{font-weight:600;font-size:13.5px}
  .powner{margin-left:14px;border-left:2px solid var(--line);padding:6px 0 0 12px;margin-top:6px;position:relative}
  .powner::before{content:"owned by";position:absolute;top:-9px;left:8px;font-size:9px;color:var(--muted);background:var(--panel-2);padding:0 4px}
  .split-tag{position:absolute;top:-9px;left:60px;font-size:9px;font-weight:700;color:var(--foreign);background:var(--panel-2);padding:0 5px;text-transform:uppercase;letter-spacing:.04em}
  .branch-band{font-size:10px;color:var(--muted);font-family:var(--font-mono);margin:2px 0 0 0}
  .leaf{display:flex;gap:7px;align-items:baseline;padding:3px 0}
  .leaf .dot{width:9px;height:9px;border-radius:50%;flex:none;position:relative;top:3px}
  .dot.entity{background:var(--entity)} .dot.person{background:var(--person)}
  .dot.foreign{background:var(--foreign)} .dot.unresolved{background:var(--unresolved)} .dot.gap{background:var(--gap)}
  .leaf .sub{font-size:11px;color:var(--muted)}
  .term{font-size:9.5px;color:#fff;border-radius:4px;padding:0 5px;margin-left:4px}
  .term.person{background:var(--person)} .term.foreign{background:var(--foreign)}
  .term.unresolved{background:var(--unresolved)} .term.gap{background:var(--gap)}

  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:12px 2px 0;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  pre.bods{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;overflow:auto;max-height:600px;font:12px/1.55 var(--font-mono)}
  .btn{display:inline-block;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;margin-bottom:10px}
  footer{margin-top:30px;color:var(--muted);font-size:12px;max-width:860px}
  @media(max-width:880px){.layout{flex-direction:column}.sidecol{width:100%}.side{position:static}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Beneficial Ownership Data Standard · v0.4</div>
    <h1 id="title">Who owned it, and when</h1>
    <p class="sub" id="subtitle"></p>
    <p class="tagline">Companies House PSC data → <b>BODS v0.4</b> → timeline, walked <b>all the way up the ownership chain</b>. FATF asks registers to keep <b>five years</b> of beneficial-ownership history. This shows what that history looks like — and where it runs out.</p>
  </header>
  <div class="gallery" id="gallery"></div>
  <div id="detail"></div>
  <footer id="footer"></footer>
</div>

<script src="data.js"></script>
<script>
const D = window.TIMELINE_DATA;
const NOW = new Date(D.built + "T00:00:00");
let current = null, mode = "timeline";

function pd(s){ if(!s) return null; const p=s.split("-").map(Number); return new Date(p[0],(p[1]||1)-1,p[2]||1); }
function fmt(d){ return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }
function within(l,d){ const s=pd(l.start), e=l.end?pd(l.end):NOW; return s&&d>=s&&d<=e; }
function pillClass(n){ n=n.toLowerCase(); if(n.startsWith("shares"))return"shares"; if(n.startsWith("voting"))return"voting"; if(n.startsWith("appoint"))return"appoint"; return"influence"; }
const TERMNOTE={person:"ultimate owner",foreign:"foreign entity — chain leaves the UK register",unresolved:"UK company — not yet walked",gap:"register records no owner"};

let SCALE=null;
function makeScale(win){ const a=pd(win.start).getTime(), b=NOW.getTime(); return {a,b,x:d=>((d.getTime()-a)/(b-a))*100}; }

/* ---------- gallery ---------- */
function renderGallery(){
  document.getElementById("title").textContent = D.gallery.title;
  document.getElementById("subtitle").textContent = D.gallery.subtitle;
  const g=document.getElementById("gallery"); g.innerHTML="";
  D.gallery.companies.forEach(c=>{
    const ult=(c.ultimate_today||[]).map(u=>`${u.name}<span class="kindtag ${u.kind}">${u.kind}</span>`).join(" ");
    const el=document.createElement("div");
    el.className="card"+(current===c.number?" active":"");
    el.innerHTML=`<div class="name">${D.companies[c.number].company.name}</div>
      <div class="hook">${c.hook}</div>
      <div class="ult"><b>Ultimate owner today:</b><br>${ult||"—"}<br>
        <span style="color:var(--muted)">chain depth ${c.stats.chain_depth} · ${c.stats.entities} entit${c.stats.entities==1?"y":"ies"}</span></div>`;
    el.onclick=()=>{current=c.number;mode="timeline";render();window.scrollTo({top:0,behavior:"smooth"});};
    g.appendChild(el);
  });
}

/* ---------- detail ---------- */
function render(){
  renderGallery();
  const host=document.getElementById("detail");
  if(!current){host.innerHTML="";return;}
  const t=D.companies[current]; SCALE=makeScale(t.window);
  host.innerHTML=`<div class="detail">
    <h2>${t.company.name}</h2>
    <div class="meta">Company № ${t.company.number} · <a href="${t.company.ch_url}" target="_blank" rel="noopener">Companies House PSC page ↗</a></div>
    <p class="blurb">${t.company.blurb}</p>
    <div class="callout"><span>⛓️</span><div><b>Why this matters.</b> ${t.stats.comparison}</div></div>
    <div class="tabs">
      <div class="tab ${mode==='timeline'?'active':''}" data-m="timeline">Chain timeline</div>
      <div class="tab ${mode==='bods'?'active':''}" data-m="bods">BODS v0.4 (${t.bods.statement_count} statements)</div>
    </div>
    <div id="pane"></div></div>`;
  host.querySelectorAll(".tab").forEach(tb=>tb.onclick=()=>{mode=tb.dataset.m;render();});
  if(mode==="timeline") renderTimeline(t); else renderBods(t);
}

/* ---------- timeline ---------- */
function renderTimeline(t){
  const rows=[];
  t.entities.forEach(e=>{
    rows.push({type:"group",e});
    e.lanes.forEach(l=>rows.push({type:"lane",e,l}));
    e.gaps.forEach(g=>rows.push({type:"gap",e,g}));
  });

  let labels="",tracks="";
  rows.forEach(r=>{
    if(r.type==="group"){
      const indent=r.e.level*14;
      labels+=`<div class="grow"><div class="glabel ${r.e.kind==='root'?'root':''}" style="padding-left:${indent}px">
        <span class="lv">${r.e.kind==='root'?'CO':'L'+r.e.level}</span>
        <a href="${r.e.ch_url}" target="_blank" rel="noopener" title="${r.e.name} on Companies House ↗">${r.e.name}</a></div></div>`;
      tracks+=`<div class="grow"></div>`;
    } else if(r.type==="lane"){
      const l=r.l;
      labels+=`<div class="lcell" style="height:58px">
        <div class="l-name">${l.owner_name}</div>
        ${l.subtitle?`<div class="l-sub">${l.subtitle}</div>`:""}
        <div class="l-type">${l.owner_kind}${l.person&&l.person.residence?` · res. ${l.person.residence}`:""}${l.owner_jurisdiction?` · ${l.owner_jurisdiction}`:""}</div></div>`;
      const start=pd(l.start), end=l.end?pd(l.end):NOW;
      const left=SCALE.x(start), w=Math.max(SCALE.x(end)-left,.5);
      const natures=(l.natures||[]).map(n=>`<span class="pill ${pillClass(n)}">${n}</span>`).join("");
      let inner=`<div class="bar ${l.owner_kind} ${l.active?'':'ceased'}" style="left:${left}%;width:${w}%"
          title="${l.owner_name}: ${l.start} → ${l.end||'present'}">${l.active?'<span class="ongoing">▸</span>':''}</div>
        <div class="natures" style="left:${left}%">${natures}</div>`;
      if(r.e.kind==="root"){
        (t.filings||[]).forEach(f=>{ if(f.description&&f.description.includes(l.owner_name)){
          const fx=SCALE.x(pd(f.date));
          inner+=`<a class="tick" style="left:${fx}%" target="_blank" rel="noopener" href="${f.doc_url||'#'}"
            title="${f.type} · ${f.date}: ${f.description} (view filing ↗)"></a>`; }});
      }
      tracks+=`<div class="tcell" style="height:58px">${inner}</div>`;
    } else {
      const g=r.g;
      labels+=`<div class="lcell" style="height:42px"><div class="l-name" style="color:var(--gap)">Register statement</div>
        <div class="l-type">declared gap</div></div>`;
      const start=pd(g.start), left=SCALE.x(start);
      let inner;
      if(g.withdrawn){
        inner=`<div class="gap-marker" style="left:${left}%" title="${g.label} — filed &amp; withdrawn same day (${g.start})"></div>
          <div class="gapbar" style="left:calc(${left}% + 10px);max-width:230px">${g.label} — filed &amp; withdrawn same day</div>`;
      } else {
        const end=g.end?pd(g.end):NOW, w=Math.max(SCALE.x(end)-left,.5);
        inner=`<div class="gapbar" style="left:${left}%;width:${w}%" title="${g.label}">${g.label}${g.active?' — still standing':''}</div>`;
      }
      tracks+=`<div class="tcell" style="height:42px">${inner}</div>`;
    }
  });

  // grid
  const startY=pd(t.window.start).getFullYear(), endY=NOW.getFullYear();
  let grid="";
  for(let y=startY;y<=endY;y++){ const gx=SCALE.x(new Date(y,0,1)); if(gx<0||gx>100)continue;
    grid+=`<div class="gridline" style="left:${gx}%"></div><div class="gridlabel" style="left:${gx}%">${y}</div>`; }
  const rx=SCALE.x(new Date(NOW.getFullYear()-5,NOW.getMonth(),NOW.getDate()));
  if(rx>0&&rx<100) grid+=`<div class="retain-line" style="left:${rx}%"></div><div class="retain-label" style="left:${rx}%">◂ FATF 5-yr horizon</div>`;
  grid+=`<div class="now-line" style="left:100%"></div>`;

  document.getElementById("pane").innerHTML=`
    <div class="layout">
      <div class="chartcol">
        <div class="chart">
          <div class="labels">${labels}</div>
          <div class="plot" id="plot"><div class="grid">${grid}</div><div id="tracks">${tracks}</div>
            <div class="cursor" id="cursor"><div class="knob"></div><div class="flag" id="cflag"></div></div></div>
        </div>
        <div class="legend">
          <span><i class="sw" style="background:var(--entity)"></i>UK company (walk up)</span>
          <span><i class="sw" style="background:var(--person)"></i>person</span>
          <span><i class="sw" style="background:var(--foreign)"></i>foreign entity</span>
          <span><i class="sw" style="background:var(--unresolved)"></i>unresolved UK co.</span>
          <span><i class="sw" style="background:var(--gap-bg);border:1px solid #f0c98a"></i>register gap</span>
          <span><i class="sw" style="background:#11161c;transform:rotate(45deg)"></i>PSC filing</span>
        </div>
      </div>
      <div class="sidecol"><div class="side" id="side"></div></div>
    </div>`;
  setupCursor(t);
}

/* ---------- date cursor → resolved chain path ---------- */
function setupCursor(t){
  const plot=document.getElementById("plot"), cursor=document.getElementById("cursor"), flag=document.getElementById("cflag");
  let frac=1;
  const dateAt=f=>new Date(SCALE.a+f*(SCALE.b-SCALE.a));
  function update(){ cursor.style.left=(frac*100)+"%"; const d=dateAt(frac); flag.textContent=fmt(d); renderPath(t,d); }
  function fromX(x){ const r=plot.getBoundingClientRect(); frac=Math.min(1,Math.max(0,(x-r.left)/r.width)); update(); }
  let drag=false;
  cursor.addEventListener("pointerdown",e=>{drag=true;cursor.setPointerCapture(e.pointerId);e.preventDefault();});
  cursor.addEventListener("pointermove",e=>{if(drag)fromX(e.clientX);});
  cursor.addEventListener("pointerup",()=>drag=false);
  plot.addEventListener("pointerdown",e=>{if(e.target.classList.contains("tick")||e.target.closest(".cursor"))return;fromX(e.clientX);});
  update();
}

function pathTree(t,on){
  const by={}; t.entities.forEach(p=>by[p.number]=p);
  const isoOn=on.toISOString().slice(0,10);
  function node(num,depth){
    const p=by[num]; if(!p||depth>8) return null;
    const owners=[];
    p.lanes.filter(l=>within(l,on)).forEach(l=>{
      if(l.owner_kind==="entity"&&by[l.owner_number])
        owners.push({name:l.owner_name,kind:"entity",natures:l.natures,child:node(l.owner_number,depth+1)});
      else owners.push({name:l.owner_name,kind:l.owner_kind,natures:l.natures,juris:l.owner_jurisdiction,child:null});
    });
    p.gaps.forEach(g=>{ if(g.active||(g.withdrawn&&g.start===isoOn)) owners.push({name:g.label,kind:"gap",child:null}); });
    return {entity:p.name,owners};
  }
  return node(t.root,0);
}

function renderNode(n){
  if(!n) return "";
  let h=`<div class="pnode"><div class="pname">${n.entity}</div>`;
  if(n.owners.length){
    const split = n.owners.length>1 ? `<span class="split-tag">${n.owners.length} co-owners · split</span>` : "";
    h+=`<div class="powner">${split}`;
    n.owners.forEach(o=>{
      const band = (o.natures&&o.natures.length) ? o.natures.join(", ") : "";
      if(o.kind==="entity"&&o.child){
        h+=`<div class="branch">${band?`<div class="branch-band">${band}</div>`:""}${renderNode(o.child)}</div>`;
      } else {
        const note=TERMNOTE[o.kind]||"";
        h+=`<div class="leaf"><span class="dot ${o.kind}"></span><div>
          <span style="font-weight:600">${o.name}</span><span class="term ${o.kind}">${o.kind}</span>
          ${o.juris?`<div class="sub">registered in ${o.juris}</div>`:""}
          <div class="sub">${note}${band?` · ${band}`:""}</div></div></div>`;
      }
    });
    h+=`</div>`;
  } else { h+=`<div class="powner"><div class="leaf"><span class="dot gap"></span><div><span class="sub">no PSC on record on this date</span></div></div></div>`; }
  return h+`</div>`;
}

function renderPath(t,d){
  const tree=pathTree(t,d);
  document.getElementById("side").innerHTML=
    `<h3>Ownership chain</h3><div class="date">as it stood on ${fmt(d)}</div>${renderNode(tree)}
     <div class="hint">Drag the black cursor across the timeline to watch the whole chain — and the ultimate owner — change through time.</div>`;
}

/* ---------- BODS ---------- */
function renderBods(t){
  const json=JSON.stringify(t.bods.statements,null,2);
  document.getElementById("pane").innerHTML=`
    <p style="margin:0 0 10px;color:var(--muted);font-size:13.5px">
      Produced by OpenCheck's <code>map_companies_house()</code> over the whole chain (fed via <code>related_companies</code>).
      A ceased PSC becomes a statement with <code>recordStatus:"closed"</code> sharing the same stable <code>recordId</code>
      as the original — that shared record id is how BODS&nbsp;0.4 links a record's versions over time
      (the older <code>replacesStatements</code> field was removed in 0.4). Each interest carries a full
      <code>startDate</code>→<code>endDate</code> window. Validated against the 0.4 schema with Open Ownership's
      <code>libcovebods</code>.</p>
    <button class="btn" id="dl">⬇ Download BODS JSON</button>
    <pre class="bods">${json.replace(/</g,"&lt;")}</pre>`;
  document.getElementById("dl").onclick=()=>{
    const blob=new Blob([JSON.stringify(t.bods.statements,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${t.company.number}-bods.json`;a.click();
  };
}

document.getElementById("footer").innerHTML=
  `Source: Companies House (Crown copyright, Open Government Licence v3.0), persons-with-significant-control register, transcribed ${D.built}. `+
  `Chains walked one level at a time up the PSC graph; foreign and unresolved owners mark where the UK register stops. `+
  `Ownership modelled in <a href="https://standard.openownership.org/" target="_blank" rel="noopener">BODS</a> v0.4 via OpenCheck's mapper. `+
  `A demonstration of why historical beneficial-ownership records matter (FATF Recommendations 24 & 25).`;

current=D.gallery.companies[0].number;
render();
</script>
